<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>凹凸学园 · 百日倒数 - Aotu Academy 100 Days</title>
<style>
:root{
  --bg:#0d1117; --panel:#161b22; --border:#e94560; --text:#e6edf3; --dim:#8b949e;
  --accent:#e94560; --gold:#f0c040; --green:#3fb950; --blue:#58a6ff; --purple:#bc8cff;
  --card:#1c2128; --hover:#252d38;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
#app{max-width:800px;margin:0 auto;padding:8px}
.cdbanner{background:linear-gradient(135deg,#1a1a3e,#2d1a3e);border:2px solid var(--border);border-radius:16px;padding:14px 20px;text-align:center;margin:8px 0;position:relative;overflow:hidden}
.cdbanner .daynum{font-size:3.5em;font-weight:900;color:var(--accent);line-height:1;text-shadow:0 0 20px rgba(233,69,96,0.5)}
.cdbanner .daylabel{font-size:0.85em;color:var(--dim);letter-spacing:2px;margin-top:2px}
.cdbanner .daysbar{height:3px;background:#333;border-radius:2px;margin-top:8px}
.cdbanner .daysfill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.5s}
.panel{background:var(--panel);border-radius:12px;padding:16px;margin:8px 0;border:1px solid #30363d}
.panel h2{color:var(--accent);font-size:1em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.btn{display:inline-block;padding:10px 18px;border-radius:8px;border:none;cursor:pointer;font-size:0.9em;font-weight:bold;transition:all 0.2s;margin:3px;font-family:inherit;position:relative;z-index:1}
.btn:active{transform:scale(0.97)}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:#c0392b;transform:translateY(-1px)}
.btn-s{background:var(--card);color:var(--text);border:1px solid #444}.btn-s:hover{background:var(--hover);border-color:#888}
.btn-xs{padding:4px 10px;font-size:0.75em}
.btn-menu{display:inline-flex;align-items:center;gap:3px;padding:4px 8px;border-radius:6px;border:1px solid #333;cursor:pointer;font-size:0.75em;font-family:inherit;background:var(--card);color:var(--text);transition:all 0.2s;white-space:nowrap}
.btn-menu:hover{background:var(--hover);border-color:var(--accent)}
.btn-menu:active{transform:scale(0.95)}
.btn-menu .btxt{font-size:0.75em;color:var(--dim)}
.btn-choice{background:var(--card);border:1px solid #444;color:var(--text);text-align:left;padding:13px 16px;width:100%;margin:4px 0;font-size:0.9em;border-radius:8px;cursor:pointer;transition:all 0.2s;line-height:1.5}
.btn-choice:hover{border-color:var(--gold);background:#252d38}
.btn-loc{background:var(--card);border:1px solid #333;color:var(--text);text-align:left;padding:12px 14px;border-radius:8px;width:100%;cursor:pointer;margin:3px 0;display:flex;align-items:center;gap:10px;transition:all 0.2s}
.btn-loc:hover{border-color:var(--accent);background:var(--hover)}
.btn-loc:active{transform:scale(0.97);border-color:var(--gold)}
.btn-loc .locemoji{font-size:1.6em;flex-shrink:0}
.btn-loc .locinfo{flex:1}
.btn-loc .locname{font-weight:bold;font-size:0.9em}
.btn-loc .lochars{font-size:0.7em;color:var(--dim);margin-top:2px}
.statusbar{display:flex;flex-wrap:wrap;gap:6px;padding:8px 10px;background:var(--card);border-radius:8px;margin:6px 0;font-size:0.75em;align-items:center}
.stat{background:#1a1a2e;padding:3px 8px;border-radius:4px;white-space:nowrap}
.stat s{color:var(--gold);font-weight:bold;font-style:normal}
.eventbox{background:var(--card);border-radius:10px;padding:18px;margin:8px 0;border-left:3px solid var(--accent);line-height:1.9}
.eventbox .narration{white-space:pre-line;color:var(--text);font-size:0.95em}
.feedback{background:#0d2818;border:2px solid var(--green);border-radius:10px;padding:14px;margin:10px 0;animation:fadeIn 0.5s}
.feedback .fbtitle{color:var(--gold);font-weight:bold;margin-bottom:4px;font-size:0.85em}
.feedback .fbtext{line-height:1.8;white-space:pre-line;font-size:0.9em}
.feedback .fbaff{font-size:0.8em;margin-top:8px;color:var(--dim)}
.fbup{color:var(--green)}.fbdown{color:#f85149}
.affgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:6px}
.affcard{background:var(--card);border-radius:8px;padding:7px 10px;display:flex;align-items:center;gap:7px}
.affcard .affemoji{font-size:1.3em;flex-shrink:0;width:30px;text-align:center}
.affcard .affinfo{flex:1;min-width:0}
.affcard .affname{font-size:0.8em;font-weight:bold}
.affcard .affbar{height:3px;background:#333;border-radius:2px;margin-top:3px}
.affcard .afffill{height:100%;border-radius:2px;transition:width 0.5s}
.affcard .affstage{font-size:0.65em;color:var(--dim);margin-top:1px}
.endbox{text-align:center;padding:40px 20px}
.endbox .endicon{font-size:6em;margin:20px 0}
.endbox h2{font-size:1.8em;letter-spacing:3px;margin:15px 0}
.endbox .endtext{line-height:2;max-width:500px;margin:15px auto;white-space:pre-line;font-size:0.95em}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fadein{animation:fadeIn 0.4s}
@keyframes pulse{0%,100%{box-shadow:0 0 0 rgba(240,192,64,0)}50%{box-shadow:0 0 15px rgba(240,192,64,0.4)}}
.pulse{animation:pulse 2s infinite}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.shake{animation:shake 0.3s}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.achtoast{position:fixed;top:20px;right:20px;background:linear-gradient(135deg,#1a1a3e,#2d1a1e);border:2px solid var(--gold);border-radius:12px;padding:14px 18px;z-index:999;animation:slideIn 0.5s ease;max-width:320px}
.achtoast .achicon{font-size:2em}
.achtoast .achname{font-weight:bold;color:var(--gold);font-size:0.9em}
.achtoast .achdesc{color:var(--dim);font-size:0.75em;margin-top:2px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#444;border-radius:3px}
@media(max-width:600px){.affgrid{grid-template-columns:repeat(2,1fr)}.cdbanner .daynum{font-size:2.5em}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ╔══════════════════════════════════════════════════════════════╗
// ║  凹凸学园 · 百日倒数 v5.7                                   ║
// ║  心魔幻
// ─── 因果境界 ───
function getKarmaTier(k){
  if(k>=500)return {t:'圆环之理',e:'🌌',l:6,clr:'#e040fb',d:'因果缠绕成环。好感度极易提升——但精神负担也达到极限。'};
  if(k>=350)return {t:'编织者',e:'🕸️',l:5,clr:'#bc8cff',d:'你开始理解命运的丝线。羁绊加深更快——但灵魂的裂痕也在扩大。'};
  if(k>=200)return {t:'干涉者',e:'⚡',l:4,clr:'#58a6ff',d:'你的存在开始扭曲既定的轨迹。好感+3，精神消耗+1。'};
  if(k>=100)return {t:'观测者',e:'👁️',l:3,clr:'#3fb950',d:'你能看到命运的分支。天赋3选1，好感+2，精神消耗+0.5。'};
  if(k>=50) return {t:'觉醒者',e:'✨',l:2,clr:'#f0c040',d:'你隐约感到——这不是第一次了。全属性+1，初始好感+2。'};
  return       {t:'凡人',e:'😶',l:1,clr:'#8b949e',d:'第一次踏入这个百日。一切才刚刚开始。'};
}

// ─── 因果被动加成（在initG中调用，不消耗因果值）───
function applyKarmaPassive(){
  const karma=G.karma||0;
  const tier=getKarmaTier(karma);
  G._karmaTier=tier;

  // 觉醒者 (≥50): 全属性+1，初始好感+3
  if(karma>=50){
    Object.keys(G.attr).forEach(k=>G.attr[k]=clamp(G.attr[k]+1,1,10));
    const affBonus=karma>=500?8:karma>=350?6:karma>=200?5:karma>=100?4:3;
    Object.keys(CH).forEach(k=>G.aff[k]=(G.aff[k]||0)+affBonus);
  }
  // 观测者 (≥100): 天赋多抽1个（在rCreate中处理）
  // 干涉者 (≥200): 好感加成+2（在execChoice中处理）
  // 编织者 (≥350): 支线触发率翻倍（在rPlay中处理）
  // 圆环之理 (≥500): 隐藏结局可触发（在rEnd中处理）

  return tier;
}

// ─── 因果值对好感度加成的被动影响（在execChoice中调用）───
function getKarmaAffBonus(){
  const k=G.karma||0;
  if(k>=500)return 5;  // 圆环之理：因果缠绕，羁绊极速
  if(k>=350)return 4;  // 编织者
  if(k>=200)return 3;  // 干涉者
  if(k>=100)return 2;  // 观测者
  if(k>=50)return 1;   // 觉醒者
  return 0;
}

// ─── 因果值对事件触发概率的影响 ───

// ─── 因果值越高→精神消耗越大（Madoka Portable核心机制：因果=祝福+诅咒）───
function getKarmaSprPenalty(){
  const k=G.karma||0;
  if(k>=500)return 3;    // 圆环之理：命运重压——承载无数轮回的记忆
  if(k>=350)return 2;    // 编织者
  if(k>=200)return 1;    // 干涉者
  if(k>=100)return 0.5;  // 观测者：轻微负担
  return 0;              // 凡人/觉醒者：无忧无虑
}

function getKarmaEventBonus(){
  const k=G.karma||0;
  if(k>=500)return 0.25; // 圆环之理：隐藏事件频发
  if(k>=350)return 0.20; // 编织者
  if(k>=200)return 0.15; // 干涉者
  if(k>=100)return 0.10; // 观测者
  if(k>=50)return 0.05;  // 觉醒者
  return 0;
}

// ─── 天赋系统 30种 ───
const TALENTS=[
  // 🔴 传说级 · 影响全局
  {id:'t_legend_1',n:'天使的碎片',e:'👼',g:5,d:'创世神残留的祝福。全属性随机+0~4，每日第一个选择额外+1好感',eff:()=>{Object.keys(G.attr).forEach(k=>G.attr[k]+=rn(0,4));G._tAngel=true;}},
  {id:'t_legend_2',n:'转校生的秘密',e:'🎭',g:5,d:'你以前在别的学校经历过什么？初始全角色好感+5，但属性全随机',eff:()=>{Object.keys(CH).forEach(k=>G.aff[k]=(G.aff[k]||0)+5);Object.keys(G.attr).forEach(k=>G.attr[k]=rn(1,10));}},

  ch1:{day:1,t:'转校生',d:'你来到了凹凸学园。\n\n丹尼尔老师在晨会上介绍你。\n\n一百天。你在这里的时间——从今天开始倒数。',unlock:1},

  ch4:{day:40,t:'期中的转折',d:'期中考试。\n\n成绩公布那天——有人在榜前站了很久。\n\n你开始意识到——一百天并不长。\n\n已经过了将近一半。',unlock:38},
  ch5:{day:50,t:'学园祭·光与影',d:'学园祭。\n\n体育馆的舞台剧。中庭的女仆咖啡店。旧教学楼的鬼屋。\n\n到处张灯结彩。\n\n你在人群中笑着——但心里有一瞬间的空洞。\n\n——已经一半了。',unlock:49},
  ch6:{day:65,t:'裂痕',d:'关系在深化。\n\n但深化意味着更多的期待——和更多的失望。\n\n争吵。误解。沉默。\n\n然后——和好。或者没有。',unlock:63},
  ch7:{day:80,t:'期末·倒计时',d:'期末考试结束。\n\n短暂假期。\n\n有人开始问：「你真的要走吗？」\n\n你无法回答。',unlock:78},

     c:[{t:'「当然——分我一半吧」',a:[{id:'anmixiu',v:8}],f:'你们一起整理了文件。安迷修的工作效率很高——但偶尔会停下来，给你讲某个文件背后的故事。'},
        {t:'「骑士也会求助——这很好」',a:[{id:'anmixiu',v:10}],f:'安迷修愣了一下。\n「……你说得对。」\n然后笑了笑——「在下的盔甲——有时候太重了。」'}],},
    {s:2,req:{aff:35,dayMin:21,dayMax:55,flag:'sq_anmixiu_s1'},t:'风纪委员的困境',x:'安迷修⚔️站在走廊——\n\n面对一群违规的学生。\n\n「校规第——」\n「得了吧骑士大人——你自己不也有放水的时候？」\n\n安迷修的手在微微发抖。',
     c:[{t:'站到他旁边：「他放水是因为理解——不是软弱」',a:[{id:'anmixiu',v:15}],f:'学生们安静了。安迷修转头看你——眼神里有惊讶，更多的是感激。'},
        {t:'帮他转移话题——化解僵局',a:[{id:'anmixiu',v:8}],f:'你巧妙地把话题引开了。风波平息后——安迷修郑重地对你鞠了一躬。'}],},
    {s:3,req:{aff:55,dayMin:56,dayMax:98,flag:'sq_anmixiu_s2'},t:'骑士的赠礼',x:'离开前。\n\n安迷修⚔️给了你一样东西。\n\n是一枚小小的骑士徽章——是他自己的。\n\n「这不是什么贵重的东西——」\n\n「但在下希望——你记得。」\n\n「有人把你当作——值得守护的人。」',
     c:[{t:'郑重地收下——别在书包上',a:[{id:'anmixiu',v:20}],f:'「我会一直带着。」\n安迷修看着你——然后行了一个标准的骑士礼。\n「一路顺风。」\n他的声音——有点哑。'},
        {t:'「你是我见过的最好的骑士」',a:[{id:'anmixiu',v:18}],f:'安迷修低下头。\n\n肩膀在颤抖。\n\n「……谢谢。」\n\n然后抬起头——眼眶是红的。但他在笑。'}],},
   ]},
  // 凯莉×安莉洁：下午四点的秘密
  {id:'sq_kaining',c:'kaili',n:'红茶与塔罗',e:'👑🍋',d:'下午四点。美术室飘出红茶香。两个人的日常——比任何魔法都坚固。',
   steps:[
    {s:1,req:{aff:20,dayMin:5,dayMax:30},t:'下午四点整',x:'下午四点。美术室。\n\n凯莉👑在倒红茶。安莉洁🍋闭着眼睛。\n\n「今天会有客人。」\n\n你推门进来。\n\n凯莉笑了。「哎呀——柠檬又说中了。」',
     c:[{t:'「你们的下午茶——可以加入吗？」',a:[{id:'kaili',v:8},{id:'anlijie',v:8}],f:'凯莉给你倒了一杯。安莉洁递过来一片柠檬。\n\n「你的心情——是金色的。」安莉洁说。\n凯莉：「别理她——她每天都说不一样的颜色。」'}],},
    {s:2,req:{aff:35,dayMin:31,dayMax:60,flag:'sq_kaining_s1'},t:'占卜屋的夜晚',x:'放学后。安莉洁🍋的占卜屋。\n\n「今天的占卜——特别准。」\n\n凯莉👑在旁边翻着塔罗牌——\n\n「柠檬。给你自己也占一卦。」\n\n安莉洁闭眼。\n\n「……我的未来里——有一个人一直在。」\n\n她没有说名字。但眼睛——看着凯莉。',
     c:[{t:'微笑着保持沉默',a:[{id:'kaili',v:10},{id:'anlijie',v:10}],f:'凯莉低头喝了一口红茶。安莉洁继续摆弄塔罗牌。\n\n空气里有什么——不需要说了。'}],},
    {s:3,req:{aff:55,dayMin:61,dayMax:98,flag:'sq_kaining_s2'},t:'百日纪念册',x:'凯莉👑给了你一本纪念册。\n\n翻开——全是你在这间美术室里的样子。\n\n喝红茶的。看安莉洁占卜的。在窗边发呆的。\n\n「——别想多了。」凯莉说。\n\n「只是想让你记得——这里永远有你的位置。」',
     c:[{t:'翻到最后一页——空白页',a:[{id:'kaili',v:15},{id:'anlijie',v:12}],f:'「这页是留给你的——」安莉洁说。\n「等你回来的时候——画上新的。」\n凯莉在旁边哼了一声——但没有反驳。'}],},
   ]},
  // 帕洛斯×佩利：忠犬与谎言
  {id:'sq_peipa',c:'paluosi',n:'暗影使者的真相',e:'🖊️🐺',d:'帕洛斯在写的小说——主角是谁？佩利知道吗？',
   steps:[
    {s:1,req:{aff:20,dayMin:10,dayMax:35},t:'手稿',x:'你不小心看到了帕洛斯🖊️的电脑屏幕。\n\n暗影使者——最新一章。\n\n主角是一个金发的不良少年——和一个跟在他后面的「忠犬」。\n\n帕洛斯合上了电脑。\n\n「……你看到了。」',
     c:[{t:'「写得很好。」真诚地说',a:[{id:'paluosi',v:10}],f:'帕洛斯眯起眼睛。\n「……真的？」\n他的表情很难读——但声音有一瞬间的不确定。'},
        {t:'「那个忠犬——是佩利吧？」',a:[{id:'paluosi',v:12}],f:'帕洛斯愣了一下。\n然后笑了——意味深长的。\n「谁知道呢。」\n但他没有否认。'}],},
    {s:2,req:{aff:40,dayMin:36,dayMax:65,flag:'sq_peipa_s1'},t:'佩利知道了',x:'佩利🐺不知道从哪里拿到了手稿。\n\n「帕洛斯——！！这个——！！」\n\n帕洛斯的表情终于变了。\n\n「你听我解释——」\n\n「超——好——看——！！」\n\n佩利眼睛在发光。\n\n帕洛斯：……\n\n帕洛斯：「……哈？」',
     c:[{t:'在旁边偷笑',a:[{id:'paluosi',v:8},{id:'peili',v:6}],f:'佩利还在追问下一章什么时候出。帕洛斯扶额——但嘴角在往上翘。'},
        {t:'「你看——他根本不介意」',a:[{id:'paluosi',v:12}],f:'帕洛斯看了你一眼。\n「……多嘴。」\n但那天晚上——他更新了。连更三章。'}],},
    {s:3,req:{aff:60,dayMin:66,dayMax:98,flag:'sq_peipa_s2'},t:'最后一章',x:'倒数第五天。\n\n帕洛斯🖊️把一本书塞给你。\n\n暗影使者——完结篇。\n\n翻到最后——\n\n「献给一个笨蛋。\n他从来不知道这本书是关于他的。\n但没关系——\n他一直在我身边。」',
     c:[{t:'「你应该把这本书也给佩利看」',a:[{id:'paluosi',v:18}],f:'帕洛斯没有回答。但第二天——你看到佩利在校门口抱着一本书。\n封面是暗影使者。\n佩利在哭。帕洛斯在旁边——没有说话。但他的手——在佩利肩膀上。'}],},
   ]},
  // 雷德×祖玛：恋爱小说的实践
  {id:'sq_leizu',c:'leide',n:'追光',e:'📖🗿',d:'雷德的暗恋笔记已经写了三百页。祖玛——真的没有注意到吗？',
   steps:[
    {s:1,req:{aff:18,dayMin:5,dayMax:25},t:'雷德的笔记',x:'图书馆。\n\n雷德📖的笔记本摊开——你瞥见了。\n\n「祖玛观察日记 Day 47\n今天祖玛说了11个字——比昨天多2个！！\n她还看了我一眼——不——应该是恰好看向这边——\n但反正是看了——！！」',
     c:[{t:'帮他把笔记本合好——假装没看到',a:[{id:'leide',v:8}],f:'雷德发现的时候——脸红得快要爆炸了。\n但你什么都没说。\n有些秘密——值得被守护。'},
        {t:'「雷德——你真的很喜欢祖玛啊」',a:[{id:'leide',v:6}],f:'雷德差点从椅子上摔下去。\n「你——你看到了——！！」\n但然后——他安静下来。「……嗯。很喜欢。」'}],},
    {s:2,req:{aff:38,dayMin:26,dayMax:55,flag:'sq_leizu_s1'},t:'祖玛的察觉',x:'祖玛🗿在图书馆。\n\n她翻到一本恋爱小说——里面夹着雷德的笔记本。\n\n她翻开。\n\n看了很久。\n\n然后——\n\n「……第47天。」\n\n她的脸——红了。很浅。但确实红了。',
     c:[{t:'「雷德——很用心的」',a:[{id:'leide',v:10},{id:'zuma',v:10}],f:'祖玛把笔记本放回原处。\n「……我知道。」\n然后补充：「从第一天开始。」'},
        {t:'安静地在旁边看书——假装没注意',a:[{id:'leide',v:5},{id:'zuma',v:5}],f:'祖玛看了你一眼。然后轻轻点了下头。\n你们之间——有一种不需要说破的共识。'}],},
    {s:3,req:{aff:58,dayMin:56,dayMax:98,flag:'sq_leizu_s2'},t:'告白',x:'毕业典礼后。\n\n雷德📖等在校门口。\n\n手里拿着一封信——和一本崭新的笔记本。\n\n封面写着：「祖玛观察日记 第二卷」\n\n祖玛🗿来了。\n\n「……你还没走。」\n「在等你——！！」',
     c:[{t:'远远地看着',a:[{id:'leide',v:20},{id:'zuma',v:18}],f:'祖玛接过信和笔记本。\n然后——放进了胸前的口袋。最靠近心脏的地方。\n\n「……第二卷。」她说。「我会看的。」\n\n雷德哭了。祖玛没有——但她的手在轻轻发抖。'}],},
   ]},
  // 嘉德罗斯：王者的孤独
  {id:'sq_jiadeluosi',c:'jiadeluosi',n:'渣渣的对手',e:'🔥👑',d:'九岁跳级的天才——其实只是想要一个真正的对手。和一个朋友。',
   steps:[
    {s:1,req:{aff:20,dayMin:5,dayMax:25},t:'成绩榜前',x:'成绩公布。\n\n嘉德罗斯🔥站在榜前。\n\n全科满分——除了物理。\n\n格瑞❄️高他0.5分。\n\n「渣渣——！！」\n\n但他的眼睛在发光。\n\n那是找到值得一战的对手时的兴奋。',
     c:[{t:'「你其实——很佩服格瑞吧？」',a:[{id:'jiadeluosi',v:8}],f:'嘉德罗斯涨红了脸。\n「佩服——？！我是要打败他——！！」\n但你看到了他嘴角的弧度。'},
        {t:'「差距只有0.5分——下次说不定就是你赢」',a:[{id:'jiadeluosi',v:6}],f:'嘉德罗斯转过头——第一次正眼看你。\n「你倒是会说。」\n然后拍了拍你的肩——\n「下次——你来见证。」'}],},
    {s:2,req:{aff:40,dayMin:26,dayMax:60,flag:'sq_jiadeluosi_s1'},t:'一个人的午餐',x:'天台。\n\n嘉德罗斯🔥一个人在吃午餐。\n\n平时围绕在他身边的同学——今天都不在。\n\n「看什么看。」\n\n但你注意到——他旁边的位置空着。\n\n好像一直在空着。',
     c:[{t:'「可以坐吗？」——不等回答就坐下',a:[{id:'jiadeluosi',v:12}],f:'嘉德罗斯瞪了你一眼——但没有赶你走。\n\n你们一起吃了午餐。\n\n「……你的便当不错。」\n这是他最接近「谢谢」的表达。'},
        {t:'分一半零食给他',a:[{id:'jiadeluosi',v:8}],f:'嘉德罗斯接过去。\n「……渣渣。我才不是因为没有才吃的。」\n但还是吃完了。'}],},
    {s:3,req:{aff:60,dayMin:61,dayMax:98,flag:'sq_jiadeluosi_s2'},t:'王者的告别',x:'最后一天。\n\n嘉德罗斯🔥在校门口等你。\n\n「渣渣。」\n\n然后递过来一个东西——是一枚小小的圣空星徽章。\n\n「去了新学校——报我的名字。」\n\n然后他转身——\n\n「下次——我会赢格瑞的。」\n\n「到时候——你回来见证。」',
     c:[{t:'「一言为定」',a:[{id:'jiadeluosi',v:20}],f:'嘉德罗斯没有回头。\n但他的手——举起来。\n一个大拇指。\n\n王者从不回头看——但你知道——他会记得这个约定。'}],},
   ]},
  // 呆毛姐弟：姐姐的守护
  {id:'sq_aibi',c:'aibi',n:'呆毛的羁绊',e:'😈😇',d:'艾比嘴上欺负埃米——但谁敢动她弟弟，她会第一个冲出去。',
   steps:[
    {s:1,req:{aff:15,dayMin:5,dayMax:30},t:'日常',x:'走廊。\n\n艾比😈在数落埃米😇——\n\n「笨蛋埃米——又把便当忘在家里了！！」\n\n埃米：「是姐姐你早上催得太急——」\n\n艾比：「还敢顶嘴——！！」\n\n但她的便当——分了一半在埃米桌上。',
     c:[{t:'在旁边微笑看着',a:[{id:'aibi',v:5},{id:'aimi',v:5}],f:'艾比瞪了你一眼——「看什么看——！」但继续给埃米夹菜。'},
        {t:'「艾比其实很会照顾人啊」',a:[{id:'aibi',v:8}],f:'艾比脸红了——「闭嘴——！！」\n埃米在旁边偷笑——被艾比敲了脑袋。'}],},
    {s:2,req:{aff:35,dayMin:31,dayMax:60,flag:'sq_aibi_s1'},t:'保护',x:'有人在欺负埃米😇。\n\n你还没来得及反应——\n\n艾比😈已经冲上去了。\n\n「离我弟弟远一点——！！」\n\n她比你想象中快得多。也凶得多。',
     c:[{t:'帮艾比——站在埃米前面',a:[{id:'aibi',v:12},{id:'aimi',v:8}],f:'艾比看了你一眼——有一瞬间的惊讶。然后转为认可。\n「……算你识相。」'},
        {t:'把埃米护在身后——让艾比看到',a:[{id:'aibi',v:10},{id:'aimi',v:8}],f:'风波过后——艾比走到你面前。\n「……谢谢你。」\n声音很小。但很认真。'}],},
    {s:3,req:{aff:55,dayMin:61,dayMax:98,flag:'sq_aibi_s2'},t:'笨弟弟的担当',x:'离别前。\n\n埃米😇给了你一样东西——是艾比做的饼干。\n\n「姐姐不好意思自己给你——」\n\n然后他抬头。\n\n「谢谢你——这一百天。照顾我姐姐。」\n\n他行了一个小小的大人礼。\n\n「我是男子汉——以后我会保护她的。」',
     c:[{t:'「你们两个——都要好好的」',a:[{id:'aibi',v:15},{id:'aimi',v:15}],f:'艾比从墙角后面探出头——眼睛红红的。\n你对她笑了笑。\n她哼了一声——但也在笑。'}],},
   ]},
  // 银爵：猫与孤独
  {id:'sq_yinjue',c:'yinjue',n:'猫与救赎',e:'🐱⛓️',d:'银爵只对猫温柔。你试着——让这份温柔分一点给别人。',
   steps:[
    {s:1,req:{aff:15,dayMin:8,dayMax:30},t:'文艺社的猫',x:'文艺社。\n\n银爵🐱在喂猫。\n\n三只。一只橘的。一只黑的。一只花的。\n\n他抬头看你——眼神冷冷的。\n\n但猫蹭了他的手——他的表情柔和了一瞬。',
     c:[{t:'蹲下来——和猫打招呼',a:[{id:'yinjue',v:8}],f:'猫蹭了你的手。银爵看着这一幕——\n「……它很少亲近陌生人。」\n他的语气——变了。变轻了。'},
        {t:'「你每天都来喂它们吗？」',a:[{id:'yinjue',v:6}],f:'银爵沉默了一会。\n「……嗯。」\n然后——\n「它们——不会背叛。」'}],},
    {s:2,req:{aff:35,dayMin:31,dayMax:65,flag:'sq_yinjue_s1'},t:'下雨天',x:'大雨。\n\n银爵🐱在校门口——没带伞。\n\n怀里护着一只纸箱——里面是三只小猫。\n\n他的衣服全湿了。但他没有把纸箱放下来。',
     c:[{t:'把自己的伞给他——然后冲进雨里',a:[{id:'yinjue',v:18}],f:'你在雨里跑了没几步——一只手拉住了你。\n\n银爵。\n\n他把你拉到伞下。\n\n「……一起。」\n这是他第一次——主动触碰别人。'},
        {t:'帮他把猫箱搬到室内',a:[{id:'yinjue',v:10}],f:'你们一起把猫转移到了文艺社。银爵擦了擦头发上的水——\n「谢谢。」\n很轻。但很真。'}],},
    {s:3,req:{aff:50,dayMin:66,dayMax:98,flag:'sq_yinjue_s2'},t:'托付',x:'离开前。\n\n银爵🐱把最小的那只猫——放到你手里。\n\n「它的名字——是你起的。」\n\n「带着。」\n\n然后他转身。\n\n「我会——试着相信。」\n\n「像你这样的人。」',
     c:[{t:'抱住猫——认真地答应',a:[{id:'yinjue',v:25}],f:'猫在你怀里叫了一声。银爵没有回头——但他的背影——好像不再那么孤独了。'},
        {t:'「我会回来看你们的——来看你和猫」',a:[{id:'yinjue',v:20}],f:'银爵停了一下。\n「……随便。」\n但你知道——他会等。'}],},
   ]},
  // 雷安：一见不钟情（致敬 Mercury.）
  {id:'sq_leian',c:'leishi',n:'一见不钟情',e:'🦁⚔️🌌',d:'有些人花了七年才发现——最讨厌的那个人，原来一直住在心里。致敬 Mercury. 雷安名作。',
   steps:[
    {s:1,req:{aff:20,dayMin:10,dayMax:35},t:'竹马',x:'体育课后。\n\n安迷修⚔️在器材室整理器械。\n\n你帮忙搬垫子时——一张旧照片从安迷修的口袋里滑了出来。\n\n照片上——两个小孩。一个揪着另一个的衣领。\n\n「这个……是雷狮？」\n\n安迷修愣住。\n\n「……是。」他没收好——声音突然低了下去。\n\n「我和他——从小就认识。」',
     c:[
      {t:'「从小就在一起……是什么感觉？」',a:[{id:'anmixiu',v:8},{id:'leishi',v:3}],f:'安迷修沉默了很久。\n\n「他小时候更过分。」\n嘴角却在往上翘。\n\n「但每次我摔倒——第一个跑过来的也是他。」'},
      {t:'安静地听着——不打断',a:[{id:'anmixiu',v:12}],f:'安迷修说了很多。\n\n关于小时候的打架、抢零食、一起翻墙被抓。\n\n说到最后——他忽然停了。\n\n「这些话——我从来没跟别人说过。」\n他看你一眼。\n「……谢谢。」'}
    ]},

// ─── 任务检查与触发 ───
function checkMainChapter(){
  for(let i=10;i>=1;i--){
    const ch=MAIN_CHAPTERS['ch'+i];
    if(G.day>=ch.unlock&&!G.flags['main_ch'+i]){
      G.flags['main_ch'+i]=true;
      G.mainChapter=i;
      return ch;
    }
  }
  return null;
}

function checkSideQuest(){
  const avail=[];
  SIDE_QUESTS.forEach(sq=>{
    if(G.completedSQ.includes(sq.id))return;
    const curStep=G.sideQuests[sq.id]||1;
    const step=sq.steps.find(s=>s.s===curStep);
    if(!step)return;
    // 检查条件
    if(G.aff[sq.c]>=step.req.aff&&G.day>=step.req.dayMin&&G.day<=step.req.dayMax){
      if(!step.req.flag||G.flags[step.req.flag])avail.push({sq,step});
    }
  });
  return avail.length>0?pk(avail):null;
}

function triggerSideQuest(sq,step){
  curEv={
    type:'sidequest',
    sq:sq.id,step:step.s,
    narration:`📋 支线 · ${sq.n} — 第${step.s}步\n\n${step.x}`,
    choices:step.c
  };
  render('event');
}

// 存储：localStorage 'aotu4_karma'

// ─── 轮回结算：计算本轮回获得的因果值 ───
function calcKarmaEarned(){
  let karma=0;
  // 最高CP好感度奖励
  let maxCP=0;Object.entries(CP).forEach(([k])=>{const a=cpAvg(k);if(a>maxCP)maxCP=a;});
  karma+=Math.floor(maxCP/2); // 最高50
  // 支线完成奖励
  karma+=(G.completedSQ||[]).length*5; // 每个支线+5
  // SPR保持奖励
  if(G.attr.SPR>=5)karma+=10; // 精神稳定+10
  // 存活天数奖励
  karma+=Math.floor(G.day/5); // 每5天+1
  // 成就奖励
  karma+=(G.achievements||[]).length*2;
  // 好感度≥90角色奖励
  let highAff=0;Object.values(G.aff).forEach(v=>{if(v>=90)highAff++;});
  karma+=highAff*8;
  return karma;
}

// ─── 感情值波动机制（高好感→SPR更易消耗）───
// 仿Madoka Portable：感情值越高→灵魂宝石越容易黑化
function getSprVolatility(){
  let maxAff=0;Object.values(G.aff).forEach(v=>{if(v>maxAff)maxAff=v;});
  if(maxAff>=80)return 2;    // 深度羁绊：SPR消耗×2（因为有羁绊保护，净效果被抵消）
  if(maxAff>=60)return 1.5;  // 重要关系：SPR消耗×1.5
  if(maxAff>=40)return 1.2;  // 友谊：SPR消耗×1.2
  return 1;
}

// ─── 更新execChoice中的SPR消耗逻辑（加入感情值波动）───
// 在SPR计算中加入波动系数（在execChoice中调用）
function applySprVolatility(sprDelta){
  if(sprDelta<0){
    const vol=getSprVolatility();
    return Math.ceil(sprDelta*vol); // 高好感时损失更大
  }
  return sprDelta;
}

// ─── 工具 ───
function rn(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pk(a){return a[Math.floor(Math.random()*a.length)];}
function dv(v){return Math.round(v+(Math.random()-0.5)*5);} // ±2.5范围偏差
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function cpAvg(key){const cp=CP[key];return Math.round(((G.aff[cp.c1]||0)+(G.aff[cp.c2]||0))/2);}
function stageName(v){return v>=90?'💖心动':v>=70?'💗亲密':v>=50?'💛好友':v>=30?'💚朋友':v>=10?'🤝认识':'😶初识';}

// ─── 日类型计算 ───
function calcDayType(day){
  if(typeof CAL!=='undefined'&&CAL[day]?.fest)return'festival';
  const mod=(day-1)%7;
  if(mod===5||mod===6)return'weekend';
  return'weekday';
}
function getDayName(day){
  const mod=(day-1)%7;
  return['周一','周二','周三','周四','周五','周六','周日'][mod];
}
function slotLabel(slot){
  const hs=CH[G.homestay];const hn=hs?hs.e+' '+hs.n:'';
  switch(slot){
    case'morning':return`🌅 早晨 · ${hn}家`;
    case'class1':return'📖 上午课';
    case'noon':return'☀️ 午间';
    case'class2':return'📝 下午课';
    case'afternoon':return G.dayType==='weekend'?'☕ 午后时光':'🌆 放学后';
    case'evening':return`🌙 晚间 · ${hn}家`;
    default:return'';
  }
}

// ─── 占位符替换工具 ───
function replacePlaceholders(str,mc,sc,hs,loc){
  // 替换 {{mc.e}} {{mc.n}} {{sc.e}} {{sc.n}} {{hs.e}} {{hs.n}} {{loc.n}} {{loc.e}} {{G.day}}
  if(mc){str=str.replace(/\{\{mc\.e\}\}/g,mc.e).replace(/\{\{mc\.n\}\}/g,mc.n);}
  if(sc){str=str.replace(/\{\{sc\.e\}\}/g,sc.e).replace(/\{\{sc\.n\}\}/g,sc.n);}
  else{str=str.replace(/\{\{sc\?[^}]+\}\}/g,'');} // 去掉sc条件模板
  if(hs){str=str.replace(/\{\{hs\.e\}\}/g,hs.e).replace(/\{\{hs\.n\}\}/g,hs.n);}
  if(loc){str=str.replace(/\{\{loc\.n\}\}/g,loc.n).replace(/\{\{loc\.e\}\}/g,loc.e);}
  str=str.replace(/\{\{G\.day\}\}/g,G.day);
  // 替换 {{pk:选项1|选项2|...}}
  str=str.replace(/\{\{pk:([^}]+)\}\}/g,(m,capt)=>{
    const opts=capt.split('|').map(s=>s.trim());
    return pk(opts);
  });
  return str;
}

// ─── 课堂事件生成器 ───
function genClassEvent(){
  const tmpl=pk(CLASS_EVENTS);
  // 基于性格过滤：该课堂事件不兼容的角色
  const banList=CHAR_CLASS_BAN[tmpl.t]||[];
  const pool=Object.keys(CH).filter(id=>CH[id]&&CH[id].c==='高一B'&&!banList.includes(id));
  const chars=[CH[pk(pool)]];
  if(Math.random()<0.4){const sc=CH[pk(pool.filter(id=>id!==chars[0].id))];if(sc)chars.push(sc);}
  const mc=chars[0],sc=chars[1];
  let x=replacePlaceholders(tmpl.x,mc,sc,null,null);
  const choices=tmpl.c.map(ch=>{
    const a=ch.a?ch.a.map(a=>{
      if(a.id==='mc')return{id:mc.id,v:dv(a.v||5)};
      if(a.id==='sc'&&sc)return{id:sc.id,v:dv(a.v||5)};
      return a;
    }).filter(a=>a.id&&CH[a.id]):[];
    const t=replacePlaceholders(ch.t,mc,sc,null,null);
    const f=ch.f?replacePlaceholders(ch.f,mc,sc,null,null):null;
    return{t,a,f};
  });
  return{type:'class',narration:x,choices,chars};
}

// ─── 借宿事件生成器 ───
function genHomeEvent(timeOfDay){
  const hs=CH[G.homestay];if(!hs)return null;
  const pool=timeOfDay==='morning'?HOME_EVENTS.morning:HOME_EVENTS.evening;
  const tmpl=pk(pool);
  let x=replacePlaceholders(tmpl.x,null,null,hs,null);
  const choices=tmpl.c.map(ch=>({
    t:ch.t,f:ch.f||null,
    a:ch.a?ch.a.map(a=>({id:a.id==='hs'?G.homestay:a.id,v:dv(a.v||5)})).filter(a=>CH[a.id]):[]
  }));
  return{type:'home',narration:x,choices,chars:[hs]};
}

// ─── 周末校外事件生成器 ───
function genWeekendEvent(locId){
  const loc=LC_OUT[locId];if(!loc)return null;
  const pool=loc.ch.filter(id=>CH[id]);if(pool.length===0)return null;
  const nChar=Math.min(rn(1,Math.min(2,pool.length)),pool.length);
  const chars=[];const tmp=[...pool].sort(()=>Math.random()-0.5);
  for(let i=0;i<nChar;i++)chars.push(CH[tmp[i]]);
  const mc=chars[0],sc=chars[1];
  const tmpl=pk(WEEKEND_TYPES);
  let x=replacePlaceholders(tmpl.x,mc,sc,null,loc);
  const choices=tmpl.c.map(ch=>{
    const a=ch.a?ch.a.map(a=>({id:a.id==='mc'?mc.id:a.id,v:dv(a.v||5)})).filter(a=>CH[a.id]):[];
    return{t:ch.t,f:ch.f||null,a};
  });
  return{type:'weekend',narration:x,choices,chars};
}

// ─── 事件简述替换工具 ───
function fillTeaser(tmpl,mc,sc,hs,loc){
  let s=tmpl;
  if(mc){s=s.replace(/\{mc\}/g,mc.e+' '+mc.n);}
  if(sc){s=s.replace(/\{sc\}/g,sc.e+' '+sc.n);}
  if(hs){s=s.replace(/\{hs\}/g,hs.e+' '+hs.n);}
  if(loc){s=s.replace(/\{loc\}/g,loc.e+' '+loc.n);}
  return s;
}

// ─── 预生成多个事件预览 ───
// locPool: 位置ID数组, count: 生成数量, genFn: 事件生成函数, opts: {cpChance, locPoolOut, isClass}
function genEventPreviews(locPool,count,genFn,opts={}){
  const previews=[];
  // 打乱位置池，取count个不重复位置
  const shuffled=[...locPool].sort(()=>Math.random()-0.5);
  const pickedLocs=shuffled.slice(0,Math.min(count,shuffled.length));

  // 对每个位置生成一个事件预览
  pickedLocs.forEach(locId=>{
    let ev;
    if(opts.isClass){
      ev=genFn(); // genClassEvent不需要locId
    }else{
      ev=genFn(locId);
    }
    if(!ev||!ev.choices||ev.choices.length===0)return;
    const loc=LC[locId]||LC_OUT[locId];
    const mc=ev.chars?ev.chars[0]:null;
    const sc=ev.chars?ev.chars[1]:null;
    // 生成简述：课堂/借宿/周末事件用narration首行，随机事件用EVENT_TEASERS模板
    let teaser;
    if(ev.type==='class'||ev.type==='home'||ev.type==='weekend'){
      // 课堂/借宿/周末事件：截取narration第一行（已替换角色名）
      const firstLine=ev.narration.replace(/\n/g,' ').slice(0,55);
      teaser=firstLine+(ev.narration.length>55?'…':'');
    }else{
      const teasers=EVENT_TEASERS[ev.type]||['{mc}似乎有什么事——'];
      teaser=fillTeaser(pk(teasers),mc,sc,null,loc);
    }
    // 课堂事件确保显示人物
    if(opts.isClass&&mc){
      teaser=mc.e+' '+mc.n+(sc?' + '+sc.e+' '+sc.n:'')+' · '+teaser;
    }
    previews.push({
      locId,locName:loc?loc.n:'',locEmoji:loc?loc.e:'',
      chars:ev.chars||[],type:ev.type,
      narration:ev.narration,choices:ev.choices,
      teaser,isCP:false,
    });
  });

  // CP事件注入：概率将其中1个替换为CP事件
  if(opts.cpChance&&Math.random()<opts.cpChance){
    const avail=Object.entries(CPS).filter(([key,data])=>{
      let stage=1;if(G.flags["cp_"+key+"_s1"])stage=2;if(G.flags["cp_"+key+"_s2"])stage=3;if(G.flags["cp_"+key+"_s3"])stage=4;if(G.flags["cp_"+key+"_s4"])stage=5;
      if(!data[stage])return false;
      if(G.flags['cp_'+key+'_s'+stage+'_done'])return false; // 已触发过的不再出现
      const avg=cpAvg(key);
      if(stage===1&&avg<10)return false;if(stage===2&&avg<25)return false;if(stage===3&&avg<45)return false;if(stage===4&&avg<60)return false;if(stage===5&&avg<75)return false;
      return true;
    });
    if(avail.length>0){
      const pick2=avail[Math.floor(Math.random()*avail.length)];
      const[key,data]=pick2;let stage=1;
      if(G.flags['cp_'+key+'_s1'])stage=2;if(G.flags['cp_'+key+'_s2'])stage=3;if(G.flags['cp_'+key+'_s3'])stage=4;if(G.flags['cp_'+key+'_s4'])stage=5;
      if(data[stage]){
        const cpData=CP[key];
        const ev=data[stage];
        const cpPreview={
          locId:'cp',locName:'特殊事件',locEmoji:'💫',
          chars:[],type:'cp',
          narration:`💫 ${cpData?.n||''} · Day ${G.day}\n\n`+ev.x,
          choices:ev.c,
          teaser:`💫 ${cpData?.n||''} · ${ev.t||''}`,
          isCP:true,cpKey:key,cpStage:stage,
        };
        // 有概率替换已有事件或追加（如果不够count）
        if(previews.length>=count&&Math.random()<0.7){
          previews[Math.floor(Math.random()*previews.length)]=cpPreview;
        }else if(previews.length<count){
          previews.push(cpPreview);
        }
      }
    }
  }
  return previews;
}

// ─── 渲染事件选择画面 ───
function renderEventSelect(app,events,timeLabel,extraHTML=''){
  if(!events||events.length===0){render('play');return;}
  window._pendingEvents=events;
  // 计算当前时段体力消耗提示
  let energyCostHint='';
  if(G.slot==='afternoon')energyCostHint='🔋-'+Math.max(4,14-G.attr.STR);
  else if(G.dayType==='weekend'||G.dayType==='festival')energyCostHint='🔋-'+Math.max(3,11-G.attr.STR);
  else if(G.slot==='noon')energyCostHint='🔋-3~5';
  else if(G.slot==='class1'||G.slot==='class2')energyCostHint='🔋-2~4';
  let cards='';
  events.forEach((ev,i)=>{
    const charsStr=ev.chars&&ev.chars.length>0
      ?ev.chars.map(c=>`${c.e||''} ${c.n||''}`).join(' + ')
      :(ev.isCP?'💫 CP事件':'');
    const border=ev.isCP?'2px solid var(--gold)':'1px solid #444';
    const badge=ev.isCP?'<span style="font-size:0.6em;background:var(--gold);color:#000;padding:2px 6px;border-radius:8px;margin-left:6px">CP事件</span>':'';
    cards+=`<button class="btn btn-choice fadein" onclick="window._pickEvent(${i})" style="text-align:left;padding:14px 16px;margin:6px 0;border:${border};${ev.isCP?'animation:pulse 2s infinite;':''}">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:1.4em;flex-shrink:0">${ev.locEmoji||'📍'}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:0.8em;color:var(--gold);font-weight:bold">${ev.locName}${badge}</div>
          <div style="font-size:0.75em;color:var(--dim);margin-top:2px">${charsStr||'???'}</div>
          <div style="font-size:0.78em;color:var(--text);margin-top:4px;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ev.teaser||'……'}</div>
        </div>
        <span style="color:var(--accent);flex-shrink:0;font-size:0.8em">选择 ▸</span>
      </div></button>`;
  });
  app.innerHTML=buildShell(`<div class="panel fadein"><h2>${timeLabel}</h2>
    <p style="color:var(--dim);font-size:0.75em;margin:4px 0 10px">多个事件同时发生——选择其中一个去参与 ${energyCostHint?'· 参与消耗 '+energyCostHint:''}</p>
    ${cards}
    ${extraHTML}
  </div>`);
}

// ─── 选择事件卡片 ───
window._pickEvent=function(idx){
  if(!window._pendingEvents||idx>=window._pendingEvents.length)return;
  const ev=window._pendingEvents[idx];
  window._pendingEvents=null;
  // 消耗体力（根据时段不同消耗量不同）
  if(G.slot==='afternoon'){
    G.energy=Math.max(0,G.energy-Math.max(4,14-G.attr.STR)); // 放学后探索：4-14
    G.attr.SPR=clamp(G.attr.SPR-rn(0,1),0,10); // 探索也消耗精神
  }else if(G.dayType==='weekend'||G.dayType==='festival'){
    G.energy=Math.max(0,G.energy-Math.max(3,11-G.attr.STR)); // 周末外出：3-11
    G.attr.SPR=clamp(G.attr.SPR-rn(0,1),0,10); // 外出消耗精神
  }else if(G.slot==='noon'){
    G.energy=Math.max(0,G.energy-rn(3,5)); // 午间社交：3-5
  }else if(G.slot==='class1'||G.slot==='class2'){
    G.energy=Math.max(0,G.energy-rn(2,4)); // 课堂参与：2-4（脑力消耗）
  }
  curEv=ev;
  if(ev.isCP){
    G.flags['cp_'+ev.cpKey+'_s'+ev.cpStage+'_done']=true;
  }
  render('event');
};

// ─── 执行选择 ───
function execChoice(ev,chIdx){
  const ch=ev.choices[chIdx];if(!ch)return{msg:'什么都没发生。',changes:[]};
  const changes=[];
  if(ch.a){ch.a.forEach(a=>{
    let val=Math.round(a.v||dv(3));
    if(G._tAngel&&G.slot==='morning')val+=1; // 天使天赋
    if(G._tBento&&ev.type==='noon')val+=2;    // 便当天赋（午间事件）
    if(G._tJoke&&(ev.type==='fun'||ev.type==='fun2')&&ev.narration.includes('笑'))val+=3; // 冷笑话天赋
    if(G._tEarly&&ev.type==='home'&&G.slot==='morning')val+=1; // 早起天赋
    if(G._tNight&&ev.type==='home'&&G.slot==='evening')val+=2; // 夜猫子天赋
    if(G._tWeather&&ev.narration&&ev.narration.includes('雨'))val+=3; // 天气天赋
    // 因果被动加成
    val+=getKarmaAffBonus();
    // 阈值效果
    if(G.attr.AFF>=7)val+=1; // 高亲和→好感加成
    if(ev.type==='study'&&G.attr.INT>=8)val+=2; // 高学力→教题效果翻倍
    if((ev.type==='chat'||ev.type==='game')&&G.attr.CHR>=8)val+=2; // 高魅力→社交加成
    if(G.attr.INT<=3&&(ev.type==='study'||ev.type==='homework'))val-=2; // 低学力→学习吃力
    if(G.attr.AFF<=3)val-=1; // 低亲和→好感减成
    const old=G.aff[a.id]||0;G.aff[a.id]=clamp(old+val,0,100);
    // 双胞胎联动：艾比/埃米好感互相影响50%
    if(a.id==="aibi"){const o2=G.aff.aimi||0;G.aff.aimi=clamp(o2+Math.round(val*0.5),0,100);changes.push({id:"aimi",n:CH.aimi?.n||"埃米",e:"😇",old:o2,val:Math.round(val*0.5)});}
    if(a.id==="aimi"){const o2=G.aff.aibi||0;G.aff.aibi=clamp(o2+Math.round(val*0.5),0,100);changes.push({id:"aibi",n:CH.aibi?.n||"艾比",e:"😈",old:o2,val:Math.round(val*0.5)});}
    changes.push({id:a.id,n:CH[a.id]?.n||a.id,e:CH[a.id]?.e||'',old,val});
  });}
  if(ch.f)G.flags['ev_'+ev.type+'_'+G.day+'_fb']=ch.f;
  if(ch.m==='match'&&ev.cp)G.flags['match_'+ev.cp]=true;
  if(ev.cp&&ev.stage)G.flags['cp_'+ev.cp+'_s'+ev.stage]=true;
  if(ev.type==='calendar')G.flags['cal_'+G.day]=true;
  if(ev.type==='forced_end'){G.day=G.maxDay+1;render('end');return{msg:'',changes:[],mode:'forced'};}
  if(ev.type==='sick_leave'&&ch.skip>0){
    G.day+=ch.skip;G.energy=100;G.attr.SPR=clamp(G.attr.SPR+2,1,10);G.slot='morning';
    G.dayType=calcDayType(G.day);
    G.journal.push({day:G.day-2,t:'请了两天病假——好好休息了一下。'});
    G.flags['sick_leave_used']=true;
    if(G.day>G.maxDay){render('end');return{msg:'',changes:[],mode:'leave'};}
  }
  if(ev.type==='sick_leave'&&!ch.skip){G.energy=Math.max(0,G.energy-15);G.attr.SPR=clamp(G.attr.SPR-rn(1,2),0,10);}
  // 支线完成处理
  if(ev.type==='sidequest'&&ev.sq){
    const sq=SIDE_QUESTS.find(q=>q.id===ev.sq);
    if(sq){
      G.flags['sq_'+ev.sq+'_s'+ev.step]=true;
      G.sideQuests[ev.sq]=ev.step+1;
      if(ev.step>=sq.steps.length){
        G.completedSQ.push(ev.sq);
        triggerAch('sq_'+ev.sq,sq.n+' · 完成','📋 一段故事走到了终点');
      }
    }
  }
  // 课堂/借宿/周末事件的成就追踪
  if(ev.type==='class'&&!G.flags['class_seen']){G.flags['class_seen']=true;G.flags['class_count']=(G.flags['class_count']||0)+1;}else if(ev.type==='class'){G.flags['class_count']=(G.flags['class_count']||0)+1;}
  if(ev.type==='home'&&G.slot==='evening'&&!G.flags['eve_seen']){G.flags['eve_count']=(G.flags['eve_count']||0)+1;}
  if(ev.type==='weekend'&&!G.flags['wk_seen_'+G.day]){G.flags['wk_seen_'+G.day]=true;G.flags['wk_count']=(G.flags['wk_count']||0)+1;}
  const msg=ch.f||'你做出了选择。';
  G.journal.push({day:G.day,t:msg,cp:ev.cp});
  if(ev.cp&&ev.stage>=4&&!G.memories.includes(ev.cp)){G.memories.push(ev.cp);triggerAch('mem_'+ev.cp,CP[ev.cp]?.n+'的记忆','📸 解锁了珍贵的回忆碎片');}
  if(G._tJournal)G.attr.SPR=clamp(G.attr.SPR+1,1,10);
  // ─── SPR灵魂宝石系统（仿Madoka Portable感情值）───
  let sprDelta=0;
  // 消耗SPR的事件（大幅上调）
  if(ev.type==='deep'||ev.type==='deep2')sprDelta-=rn(3,4);     // 情绪落寞
  else if(ev.type==='argue')sprDelta-=3;                          // 争执
  else if(ev.type==='farewell'||ev.type==='final_words')sprDelta-=4; // 离别伤感
  else if(ev.type==='sick'||ev.type==='sick2')sprDelta-=rn(2,3); // 照顾病人
  else if(ev.type==='detention')sprDelta-=3;                      // 被罚留堂
  else if(ev.type==='comfort')sprDelta-=rn(2,3);                  // 安慰别人
  else if(ev.type==='thunder')sprDelta-=rn(1,2);                  // 打雷
  else if(ev.type==='nightmare'||ev.type==='dream')sprDelta-=rn(1,2); // 噩梦
  else if(ev.type==='club_clash')sprDelta-=rn(1,2);               // 社团冲突
  else if(ev.type==='injury')sprDelta-=1;                          // 受伤
  // 恢复SPR的事件（确定性恢复 + 概率加成）
  if(ev.type==='celebrate')sprDelta+=rn(1,3);                      // 庆祝：大幅恢复
  else if(ev.type==='share'||ev.type==='song_rec')sprDelta+=rn(1,2); // 分享：稳定恢复
  else if(ev.type==='promise')sprDelta+=rn(1,2);                   // 约定：温暖恢复
  else if(ev.type==='pet')sprDelta+=rn(1,2);                       // 小动物：治愈恢复
  else if(ev.type==='rooftop'||ev.type==='star')sprDelta+=rn(1,2); // 安静时刻：放松恢复
  else if(ev.type==='walk_home')sprDelta+=rn(1,2);                 // 一起回家：安心恢复
  else if(ev.type==='home'&&G.slot==='evening')sprDelta-=rn(0,1); // 晚间社交：一天下来累了
  else if(ev.type==='home'&&G.slot==='morning')sprDelta+=rn(1,2); // 早晨：新的一天活力
  else if(ev.type==='lunch'||ev.type==='lunch2')sprDelta+=rn(0,1); // 一起吃饭：小恢复
  else if(ev.type==='photo')sprDelta+=rn(0,1);                     // 拍照：快乐恢复
  else if(ev.type==='weekend')sprDelta+=rn(1,2);                   // 周末偶遇：休闲恢复
  else if(ev.type==='help'||ev.type==='help2')sprDelta+=rn(0,1);   // 帮助别人：意义感恢复
  else if(ev.type==='message'||ev.type==='message2')sprDelta+=rn(0,1); // 收到消息：连接感恢复
  else if(ev.type==='game'||ev.type==='game2')sprDelta+=rn(0,1);   // 游戏：轻松恢复
  else if(ev.type==='study'||ev.type==='study2')sprDelta+=rn(0,1); // 学习：充实感恢复
  // 高好感角色在场的额外SPR恢复（羁绊保护机制）
  if(ev.chars&&ev.chars.length>0){
    let maxAff=0;ev.chars.forEach(c=>{if(G.aff[c.id]>maxAff)maxAff=G.aff[c.id];});
    if(maxAff>=70)sprDelta+=2;  // 深度羁绊：与在意的人在一起本身就是治愈
    else if(maxAff>=50)sprDelta+=1; // 好友：安心感
  }
  // 感情值波动：高好感→SPR更脆弱（仿Madoka Portable）— 仅影响事件消耗，不影响每日固定消耗
  if(sprDelta<0&&ev.type!=='daily'){sprDelta=applySprVolatility(sprDelta);sprDelta-=getKarmaSprPenalty();}
  // 钢铁意志：SPR损失减半
  if(G.attr.SPR>=7&&sprDelta<0)sprDelta=Math.ceil(sprDelta/2);
  if(G._tChill&&sprDelta<0)sprDelta=Math.ceil(sprDelta/2);
  G.attr.SPR=clamp(G.attr.SPR+sprDelta,0,10);
  // 低SPR追踪（低于阈值累积天数，触发提前转学）
  if(G.attr.SPR<=2){
    G.lowSprDays++;
    if(!G.sprWarned){G.sprWarned=true;triggerAch('spr_low','灵魂宝石的裂痕','🧘 精神值持续走低——再这样下去……你可能撑不到100天');}
  }else{G.lowSprDays=Math.max(0,G.lowSprDays-1);if(G.attr.SPR>=5)G.sprWarned=false;}
  if(G.attr.SPR<=0){G.attr.SPR=1;G.energy=Math.max(0,G.energy-25);}// 归零重击
  // ─── 五维属性动态变化（仿Madoka Portable角色成长）───
  let attrDelta={INT:0,CHR:0,STR:0,AFF:0};
  // 学力变化
  if(ev.type==='study'||ev.type==='study2')attrDelta.INT+=rn(1,2);
  else if(ev.type==='class'&&ev.narration.includes('数学'))attrDelta.INT+=1;
  else if(ev.type==='homework')attrDelta.INT+=rn(0,1);
  // 魅力变化
  if(ev.type==='chat'||ev.type==='game')attrDelta.CHR+=rn(0,1);
  else if(ev.type==='photo'||ev.type==='rumor')attrDelta.CHR+=1;
  else if(ev.type==='fun'||ev.type==='fun2')attrDelta.CHR+=rn(0,1);
  // 体力变化
  if(ev.type==='sports'||ev.type==='sports2'){attrDelta.STR+=rn(1,2);if(G.attr.STR>=7)attrDelta.STR+=1;} // 高体力加成
  else if(ev.type==='injury'){attrDelta.STR-=rn(0,1);if(G.attr.STR>=8)attrDelta.STR=0;} // 高体力不容易受伤
  else if(ev.type==='walk_home'||ev.type==='cleaning')attrDelta.STR+=rn(0,1);
  // 亲和力变化
  if(ev.type==='deep'||ev.type==='deep2')attrDelta.AFF+=1;
  else if(ev.type==='help')attrDelta.AFF+=rn(0,1);
  else if(ev.type==='share'||ev.type==='comfort')attrDelta.AFF+=1;
  else if(ev.type==='argue')attrDelta.AFF-=rn(0,1);
  // 应用变化
  Object.keys(attrDelta).forEach(k=>{if(attrDelta[k]!==0)G.attr[k]=clamp(G.attr[k]+attrDelta[k],1,10);});
  // 能量消耗（放学后/周末探索）
  if(ev.type&&(G.slot==='afternoon'||G.dayType==='weekend')){
    G.energy=Math.max(0,G.energy-rn(3,8));
  }
  checkMilestones();
  return{msg,changes,mode:ch.m||'neutral',sprDelta,attrDelta};
}

function checkMilestones(){
  Object.entries(CP).forEach(([k,cp])=>{const a=cpAvg(k);if(a>=80&&!G.flags['m80_'+k]){G.flags['m80_'+k]=true;triggerAch('m80_'+k,cp.n+'·心意相通','💖 有些话已经不需要说出口了');}if(a>=50&&!G.flags['m50_'+k]){G.flags['m50_'+k]=true;triggerAch('m50_'+k,cp.n+'·逐渐靠近','💛 有什么正在悄然改变');}});
  Object.entries(G.aff).forEach(([id,v])=>{if(v>=90&&!G.flags['a90_'+id]){G.flags['a90_'+id]=true;triggerAch('a90_'+id,'💖 '+CH[id]?.n,CH[id]?.n+'已经把你当作非常重要的人了');}});
  // 新增成就
  if(G.flags['class_count']>=15&&!G.flags['ach_class']){G.flags['ach_class']=true;triggerAch('class_star','课堂之星','📖 课堂上已经帮过很多人了');}
  if(G.flags['eve_count']>=5&&!G.flags['ach_eve']){G.flags['ach_eve']=true;triggerAch('eve_talk','晚间的秘密','🌙 在借宿的夜晚——有过很多次深夜谈心');}
  if(G.flags['wk_count']>=6&&!G.flags['ach_wk']){G.flags['ach_wk']=true;triggerAch('wk_explorer','周末探险家','🏖️ 周末去过很多校外的地方');}
  if(G.homestay&&!G.flags['hs_'+G.homestay]){G.flags['hs_'+G.homestay]=true;
    const hsSeen=HOMESTAY_POOL.filter(h=>G.flags['hs_'+h]).length;
    if(hsSeen>=3)triggerAch('hs3','借宿达人','🏠 已经在3个不同的角色家借宿过了');
  }
}

function triggerAch(id,name,desc){
  if(G.achievements.includes(id))return;G.achievements.push(id);
  toastQ.push({name,desc});if(toastQ.length===1)showToast();
}
function showToast(){
  if(toastQ.length===0)return;const t=toastQ.shift();
  const el=document.createElement('div');el.className='achtoast';
  el.innerHTML=`<div class="achicon">🏆</div><div class="achname">成就解锁：${t.name}</div><div class="achdesc">${t.desc}</div>`;
  document.body.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity 0.5s';setTimeout(()=>{el.remove();if(toastQ.length>0)setTimeout(showToast,300);},500);},2500);
}

// ─── 随机属性分配器 ───
function randomizeAttrs(){
  const keys=['INT','CHR','STR','AFF','SPR'];
  const attrs={};keys.forEach(k=>attrs[k]=rn(1,5)); // 基础随机1-5
  let remain=15;
  // 随机投入剩余点数
  while(remain>0){
    const k=pk(keys);
    if(attrs[k]<10){attrs[k]++;remain--;}
  }
  return attrs;
}

// ─── 随机天赋选择器 ───
function randomizeTalents(){
  const pickCount=loadKarma()>=100?3:2; // 观测者以上：3选1

  const pool=[...TALENTS].sort(()=>Math.random()-0.5);
  // 根据权重概率抽取2个（高稀有度概率更低，但可能抽到）
  const selected=[];
  const weights=pk([...Array(5)].map((_,i)=>i)); // 随机决定抽卡偏向
  for(let i=0;i<pickCount;i++){
    const r=Math.random();
    let pick;
    if(r<0.05)pick=pool.find(t=>t.g>=5);     // 5%传说
    else if(r<0.20)pick=pool.find(t=>t.g===4); // 15%史诗
    else if(r<0.45)pick=pool.find(t=>t.g===3); // 25%稀有
    else if(r<0.75)pick=pool.find(t=>t.g===2); // 30%普通
    else pick=pool.find(t=>t.g<=1);            // 25%平凡
    if(!pick||selected.find(s=>s.id===pick.id))pick=pool.find(t=>!selected.find(s=>s.id===t.id));
    if(pick)selected.push(pick);
  }
  return selected.slice(0,pickCount);
}

function advanceSlot(){
  const dt=G.dayType;
  switch(G.slot){
    case'morning':
      if(dt==='weekend'||dt==='festival')G.slot='noon';
      else {G.slot='class1';G.energy=Math.max(0,G.energy-rn(3,5));} // 早晨出门消耗
      break;
    case'class1':G.slot='noon';
      // 上完上午课——精神微耗
      if(dt==='weekday')G.attr.SPR=clamp(G.attr.SPR-rn(0,1),0,10);
      break;
    case'noon':
      if(dt==='weekend'||dt==='festival')G.slot='afternoon';
      else G.slot='class2';
      break;
    case'class2':G.slot='afternoon';
      // 上完下午课——精神微耗
      if(dt==='weekday')G.attr.SPR=clamp(G.attr.SPR-rn(0,1),0,10);
      break;
    case'afternoon':G.slot='evening';break;
    case'evening':
      // 频繁社交疲劳检查（今日参与事件≥2 → 精神消耗）
      if(G.dailyEvents>=4){
        G.attr.SPR=clamp(G.attr.SPR-2,0,10); // 社交过度
      }else if(G.dailyEvents>=2){
        G.attr.SPR=clamp(G.attr.SPR-1,0,10); // 社交疲劳
      }
      // 低体力入睡前额外精神消耗（体力<25 → 焦虑失眠）
      if(G.energy<=25){
        G.attr.SPR=clamp(G.attr.SPR-rn(1,2),0,10);
      }
      G.slot='morning';G.day++;G.dailyEvents=0; // 重置每日事件计数
      // 连续上学天数追踪
      if(G.dayType==='weekend'||G.dayType==='festival'){G.schoolStreak=0;}
      else{G.schoolStreak=(G.schoolStreak||0)+1;}
      // 精神低迷拖累体力恢复（SPR≤3 → 回血减半）
      const sprLowPenalty=G.attr.SPR<=3?0.5:1;
      G.energy=Math.min(100,Math.floor((60+G.attr.STR*3)*sprLowPenalty));
      G.dayType=calcDayType(G.day);
      // 每日SPR消耗：周末/假日恢复，工作日微降
      if(G.dayType==='weekend'||G.dayType==='festival'){
        G.attr.SPR=clamp(G.attr.SPR+1,0,10); // 周末自然恢复+1
      } else {
        // 基础消耗
        let dailySprCost=1;
        // 考试日精神消耗翻倍
        const cal=CAL[G.day-1];
        if(cal&&(cal.n.includes('考试')||cal.n.includes('小测')||cal.n.includes('测验')))dailySprCost=2;
        // 周一忧郁（周末后返校）
        if(getDayName(G.day)==='周一')dailySprCost+=1;
        // 临近离别焦虑（Day 80+，倒计时压力）
        if(G.day>=80)dailySprCost+=1;
        // 连续上学疲劳（≥3天无休）
        if(G.schoolStreak>=5)dailySprCost+=2;
        else if(G.schoolStreak>=3)dailySprCost+=1;
        G.attr.SPR=clamp(G.attr.SPR-dailySprCost-getKarmaSprPenalty(),0,10);
      }
      // 高体力入睡 → 额外SPR恢复；低体力 → 额外消耗
      if(G.energy>=80)G.attr.SPR=clamp(G.attr.SPR+1,0,10);
      else if(G.energy>=60)G.attr.SPR=clamp(G.attr.SPR+rn(0,1),0,10);
      else if(G.energy<=30)G.attr.SPR=clamp(G.attr.SPR-1,0,10); // 体力不足入睡困难
      break;
  }
  // 体力归零惩罚：精神受损
  if(G.energy<=0){
    G.energy=0;
    G.attr.SPR=clamp(G.attr.SPR-1,0,10);
  }
}

window._goOut=function(locId){

  const cpChance=G._tSeventh?0.20:0.10;

      let stage=1;if(G.flags["cp_"+key+"_s1"])stage=2;if(G.flags["cp_"+key+"_s2"])stage=3;if(G.flags["cp_"+key+"_s3"])stage=4;if(G.flags["cp_"+key+"_s4"])stage=5;

window._diary=function(){
  const baseGain=rn(2,4);
  const bonusGain=G._tJournal?2:0;
  const actualGain=baseGain+bonusGain;
  const energyCost=rn(8,12);
  const bonusMsg=G._tJournal?'（命运的笔记者天赋：额外+2精神）':'';
  G.attr.SPR=clamp(G.attr.SPR+actualGain,0,10);
  // 保存当前体力——熬夜写日记不会睡觉回体力
  const savedEnergy=G.energy;
  const hs=CH[G.homestay];
  const entries=[
    `📓 写下了今天发生的事。\n\n有些细节——如果不记下来，可能会忘记吧。\n\n合上笔记本。${hs?hs.e+' '+hs.n+'给你倒了杯水放在桌边。':''}\n\n心里轻了很多。`,
    `📓 翻看前几天的日记。\n\n不知不觉——已经写了这么多页了。\n\n每一页都是活的。\n\n笔停了。该睡了。`,
    `📓 写了几行。然后停住了。\n\n有些心情——好像不适合写在纸上。\n\n但写下来之后——确实轻松了一点。\n\n关灯。明天见。`,
  ];
  const msg=`${pk(entries)}\n${bonusMsg}\n\n（💡 熬夜写日记 · 没有睡觉恢复体力 · 体力 -${energyCost}）`;
  G.journal.push({day:G.day,t:msg});
  curEv=null;
  // 推进到次日（天数/SPR变化等正常处理）
  advanceSlot();
  // 熬夜不睡 → 体力不恢复，反而消耗
  G.energy=Math.max(0,savedEnergy-energyCost);
  if(G.day>G.maxDay){render('end');return;}
  render('play',{msg,changes:[],sprDelta:actualGain});
};

window._ch=function(idx){
  if(!curEv)return;
  // 心魔幻境入口
  if(curEv.type==='heart_demon'){
    G.dailyEvents++;
    startHeartDemonBattle();
    return;
  }
  // 今日事件计数（强制结束和请假不计数——不是"社交"事件）
  if(curEv.type!=='forced_end'&&curEv.type!=='sick_leave'){
    G.dailyEvents++;
  }
  // 处理社团选择
  const ch=curEv.choices[idx];
  if(ch&&ch.club!==undefined){G.club=ch.club;}
  const result=execChoice(curEv,idx);
  try{localStorage.setItem('aotu4_ach',JSON.stringify(G.achievements));}catch(e){}
  if(result&&result.mode!=="forced")render('play',result);
};

function startHeartDemonBattle(){
  const app=document.getElementById('app');
  app.innerHTML='<canvas id="battleCanvas" width="800" height="500" style="border:2px solid var(--accent);border-radius:12px;background:#0a0a14;display:block;margin:10px auto;cursor:crosshair"></canvas>';
  const canvas=document.getElementById('battleCanvas');
  battleCtx=canvas.getContext('2d');
  battleScore=0;battleTime=60;battleWave=1;battleOver=false;battleWon=false;
  enemies=[];bullets=[];particles=[];
  player={x:400,y:250,vx:0,vy:0,spd:2.5,hp:100,maxHp:100,shootCD:0,shootRate:Math.max(8,22-G.attr.INT*1.5),dmg:1+Math.floor(G.attr.STR/3),slow:0,silence:0,reverse:0,_flash:0,invincible:600};// 前10秒霸体(600帧)
  spawnWave();
  document.addEventListener('keydown',battleKeyDown);document.addEventListener('keyup',battleKeyUp);
  canvas.addEventListener('mousemove',battleMouseMove);canvas.addEventListener('click',battleClick);
  if(battleAnim)cancelAnimationFrame(battleAnim);
  battleLoop();
}

function spawnWave(){
  const count=3+battleWave*2;
  for(let i=0;i<count;i++)spawnEnemy(1);
  battleWave++;
}

function spawnEnemy(n){
  for(let i=0;i<n;i++){
    const ids=Object.keys(CH).filter(k=>CH[k]&&CH[k].c!=='教师');
    const id=pk(ids);const ch=CH[id];
    const aff=G.aff[id]||0;
    const hp=10+Math.floor(aff/10);
    const spd=1+Math.random()*1.5+aff*0.02;
    const worth=1+Math.floor(aff/20);
    // 随机从屏幕各处出现——边缘或内部（但离玩家至少100px）
    let x,y;
    if(Math.random()<0.5){
      // 屏幕内部随机位置
      do{x=rn(50,750);y=rn(50,450);}while(player&&dist({x,y},player)<120);
    }else{
      // 屏幕边缘随机位置
      const side=Math.floor(Math.random()*4);
      switch(side){
        case 0:x=Math.random()*800;y=-20;break;
        case 1:x=820;y=Math.random()*500;break;
        case 2:x=Math.random()*800;y=520;break;
        case 3:x=-20;y=Math.random()*500;break;
      }
    }
    enemies.push({id,x,y,vx:0,vy:0,spd,hp,maxHp:hp,worth,ch,aff,_cd:rn(30,90),_bullets:[],_trail:[],_dash:0,_buff:0,_clones:0,_clone:false,_predict:null,_target:null,slow:0,silence:0,reverse:0,_flash:0});
  }
}

const battleKeys={};
function battleKeyDown(e){battleKeys[e.key.toLowerCase()]=true;e.preventDefault();}
function battleKeyUp(e){battleKeys[e.key.toLowerCase()]=false;e.preventDefault();}
function battleMouseMove(e){
  if(!player)return;
  const r=e.target.getBoundingClientRect();
  player.mx=e.clientX-r.x;player.my=e.clientY-r.y;
}
function battleClick(e){
  if(!player||player.silence>0||player.shootCD>0)return;
  const r=e.target.getBoundingClientRect();
  const mx=e.clientX-r.x,my=e.clientY-r.y;
  const a=Math.atan2(my-player.y,mx-player.x);
  bullets.push({x:player.x,y:player.y,vx:Math.cos(a)*7,vy:Math.sin(a)*7,life:70,from:'player'});
  player.shootCD=player.shootRate;
}

function battleLoop(){
  if(battleOver){renderBattleResult();return;}
  battleCtx.clearRect(0,0,800,500);
  battleTime-=1/60;
  if(battleTime<=0){battleOver=true;battleWon=true;renderBattleResult();return;}
  if(battleTime<=45&&battleWave===2)spawnWave();
  if(battleTime<=30&&battleWave===3)spawnWave();
  if(battleTime<=15&&battleWave===4)spawnWave();

  // Player movement
  if(!player.reverse||player.reverse<=0){
    if(battleKeys['w']||battleKeys['arrowup'])player.vy=-player.spd;
    else if(battleKeys['s']||battleKeys['arrowdown'])player.vy=player.spd;
    else player.vy*=0.8;
    if(battleKeys['a']||battleKeys['arrowleft'])player.vx=-player.spd;
    else if(battleKeys['d']||battleKeys['arrowright'])player.vx=player.spd;
    else player.vx*=0.8;
  }else{
    if(battleKeys['w']||battleKeys['arrowup'])player.vy=player.spd;
    else if(battleKeys['s']||battleKeys['arrowdown'])player.vy=-player.spd;
    else player.vy*=0.8;
    if(battleKeys['a']||battleKeys['arrowleft'])player.vx=player.spd;
    else if(battleKeys['d']||battleKeys['arrowright'])player.vx=-player.spd;
    else player.vx*=0.8;
  }
  const spdMul=player.slow>0?0.5:1;
  player.x=Math.max(15,Math.min(785,player.x+player.vx*spdMul));
  player.y=Math.max(15,Math.min(485,player.y+player.vy*spdMul));
  if(player.shootCD>0)player.shootCD--;
  if(player.slow>0)player.slow--;
  if(player.silence>0)player.silence--;
  if(player.reverse>0)player.reverse--;
  if(player._flash>0)player._flash--;
  if(player.invincible>0)player.invincible--;

  // Auto-shoot toward mouse
  if(player.shootCD<=0&&player.mx!==undefined&&player.silence<=0){
    const a=Math.atan2(player.my-player.y,player.mx-player.x);
    bullets.push({x:player.x,y:player.y,vx:Math.cos(a)*7,vy:Math.sin(a)*7,life:60,from:'player'});
    player.shootCD=player.shootRate;
  }

  // Update enemies
  enemies=enemies.filter(e=>e.hp>0);
  enemies.forEach(e=>{
    if(e._clone&&e._clones===undefined)e._clones=0;
    // Pick target: 40% chance to target another enemy, 60% player
    if(!e._target||e._target.hp<=0||Math.random()<0.005){
      const others=enemies.filter(o=>o!==e&&o.hp>0);
      if(others.length>0&&Math.random()<0.4){
        e._target=pk(others);
      }else{
        e._target=player;
      }
    }
    const target=e._target||player;
    // Movement toward target
    const a=Math.atan2(target.y-e.y,target.x-e.x);
    if(e._dash>0){e._dash--;}else{e.vx=Math.cos(a)*e.spd;e.vy=Math.sin(a)*e.spd;}
    if(e._buff>0)e._buff--;
    if(e.slow>0)e.slow--;
    if(e.silence>0)e.silence--;
    if(e.reverse>0)e.reverse--;
    if(e._flash>0)e._flash--;
    e.x=Math.max(10,Math.min(790,e.x+e.vx));
    e.y=Math.max(10,Math.min(490,e.y+e.vy));
    if(e._cd>0)e._cd--;
    // Execute character skill against current target
    const sk=BATTLE_CHAR_SKILLS[e.id];
    if(sk&&sk.act&&Math.random()<0.03)sk.act(e,target);
    // Enemy bullets (move)
    if(e._bullets&&e._bullets.length>0){
      e._bullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.life--;});
      e._bullets=e._bullets.filter(b=>b.life>0&&b.x>0&&b.x<800&&b.y>0&&b.y<500);
    }
    // Trail
    if(e._trail&&e._trail.length>0){
      e._trail.forEach(t=>t.life--);
      e._trail=e._trail.filter(t=>t.life>0);
    }
  });

  // Update bullets
  bullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.life--;});
  bullets=bullets.filter(b=>b.life>0&&b.x>0&&b.x<800&&b.y>0&&b.y<500);

  // Player bullets hit enemy
  bullets.filter(b=>b.from==='player').forEach(b=>{
    enemies.forEach(e=>{
      if(dist(b,e)<18+Math.max(0,e.aff/15)){
        e.hp-=player.dmg;b.life=0;
        if(e.hp<=0){
          battleScore+=e.worth;
          // Death particles
          for(let i=0;i<8;i++)particles.push({x:e.x,y:e.y,vx:rn(-3,3),vy:rn(-3,3),life:20,color:e.ch?.clr||'#fff'});
        }
      }
    });
  });
  // Enemy bullets hit other enemies（互相对攻）
  enemies.forEach(shooter=>{
    if(shooter._bullets)shooter._bullets.forEach(b=>{
      enemies.forEach(e=>{
        if(e!==shooter&&dist(b,e)<18){
          e.hp-=4;b.life=0;
          if(e.hp<=0){
            battleScore+=e.worth;
            for(let i=0;i<8;i++)particles.push({x:e.x,y:e.y,vx:rn(-3,3),vy:rn(-3,3),life:20,color:e.ch?.clr||'#fff'});
          }
        }
      });
    });
  });
  // Enemy-enemy contact damage（互相锁定=互殴）
  enemies.forEach(e1=>{
    enemies.forEach(e2=>{
      if(e1!==e2&&dist(e1,e2)<20&&e1._target===e2&&e2._target===e1){
        e1.hp-=0.8;e2.hp-=0.8;
        if(e1.hp<=0){
          battleScore+=e1.worth;
          for(let i=0;i<8;i++)particles.push({x:e1.x,y:e1.y,vx:rn(-3,3),vy:rn(-3,3),life:20,color:e1.ch?.clr||'#fff'});
        }
        if(e2.hp<=0){
          battleScore+=e2.worth;
          for(let i=0;i<8;i++)particles.push({x:e2.x,y:e2.y,vx:rn(-3,3),vy:rn(-3,3),life:20,color:e2.ch?.clr||'#fff'});
        }
      }
    });
  });
  // Enemy bullets/contact hit player（霸体期间免疫伤害）
  if(player.invincible<=0){
    enemies.forEach(e=>{
      if(e._bullets)e._bullets.forEach(b=>{
        if(dist(b,player)<15){player.hp-=4;b.life=0;player._flash=5;}
      });
      if(dist(e,player)<20){player.hp-=2;player._flash=5;}
      if(e._trail)e._trail.forEach(t=>{
        if(dist(t,player)<18){player.hp-=3;}
      });
    });
  }

  // Update particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});
  particles=particles.filter(p=>p.life>0);

  // Player death
  if(player.hp<=0){battleOver=true;battleWon=false;renderBattleResult();return;}

  // ---- RENDER ----
  // Background grid
  battleCtx.strokeStyle='#1a1a2e';battleCtx.lineWidth=1;
  for(let i=0;i<800;i+=40){battleCtx.beginPath();battleCtx.moveTo(i,0);battleCtx.lineTo(i,500);battleCtx.stroke();}
  for(let i=0;i<500;i+=40){battleCtx.beginPath();battleCtx.moveTo(0,i);battleCtx.lineTo(800,i);battleCtx.stroke();}

  // Particles
  particles.forEach(p=>{
    battleCtx.fillStyle=p.color;battleCtx.globalAlpha=p.life/20;
    battleCtx.fillRect(p.x-2,p.y-2,4,4);battleCtx.globalAlpha=1;
  });

  // Enemy trails
  enemies.forEach(e=>{
    if(e._trail)e._trail.forEach(t=>{
      battleCtx.fillStyle='rgba(255,100,0,0.4)';battleCtx.beginPath();battleCtx.arc(t.x,t.y,14,0,Math.PI*2);battleCtx.fill();
    });
  });

  // Enemy bullets
  enemies.forEach(e=>{
    if(e._bullets)e._bullets.forEach(b=>{
      battleCtx.fillStyle=e.ch?.clr||'#f44';battleCtx.beginPath();battleCtx.arc(b.x,b.y,4,0,Math.PI*2);battleCtx.fill();
    });
  });

  // Enemies
  enemies.forEach(e=>{
    const clr=e.ch?.clr||'#f44';
    battleCtx.fillStyle=clr;battleCtx.beginPath();battleCtx.arc(e.x,e.y,14+Math.floor(e.aff/15),0,Math.PI*2);battleCtx.fill();
    battleCtx.fillStyle='#fff';battleCtx.font='bold 9px sans-serif';battleCtx.textAlign='center';
    battleCtx.fillText(e.ch?.e||'?',e.x,e.y+4);
    // HP bar
    battleCtx.fillStyle='#333';battleCtx.fillRect(e.x-15,e.y-22,30,4);
    battleCtx.fillStyle='#f44';battleCtx.fillRect(e.x-15,e.y-22,30*(e.hp/e.maxHp),4);
    // Worth
    battleCtx.fillStyle='#f0c040';battleCtx.font='bold 8px sans-serif';
    battleCtx.fillText('+'+e.worth,e.x,e.y-26);
  });

  // Player bullets
  bullets.filter(b=>b.from==='player').forEach(b=>{
    battleCtx.fillStyle='#58a6ff';battleCtx.beginPath();battleCtx.arc(b.x,b.y,3,0,Math.PI*2);battleCtx.fill();
  });

  // Player
  if(player._flash%2===0){
    // 霸体光环
    if(player.invincible>0){
      battleCtx.strokeStyle='#f0c040';battleCtx.lineWidth=3;battleCtx.globalAlpha=0.5+Math.sin(Date.now()*0.01)*0.3;
      battleCtx.beginPath();battleCtx.arc(player.x,player.y,22,0,Math.PI*2);battleCtx.stroke();
      battleCtx.globalAlpha=1;
      battleCtx.fillStyle='#f0c040';battleCtx.font='bold 10px sans-serif';battleCtx.textAlign='center';
      battleCtx.fillText('🛡️霸体 '+Math.ceil(player.invincible/60)+'s',player.x,player.y-30);
    }
    battleCtx.fillStyle='#58a6ff';battleCtx.beginPath();battleCtx.arc(player.x,player.y,15,0,Math.PI*2);battleCtx.fill();
    battleCtx.fillStyle='#fff';battleCtx.font='bold 11px sans-serif';battleCtx.textAlign='center';
    battleCtx.fillText('🛡️',player.x,player.y+4);
    if(player.slow>0){battleCtx.strokeStyle='#8bf';battleCtx.lineWidth=2;battleCtx.beginPath();battleCtx.arc(player.x,player.y,17,0,Math.PI*2);battleCtx.stroke();}
    if(player.reverse>0){battleCtx.strokeStyle='#f8f';battleCtx.lineWidth=2;battleCtx.beginPath();battleCtx.arc(player.x,player.y,19,0,Math.PI*2);battleCtx.stroke();}
  }

  // HUD
  battleCtx.fillStyle='rgba(0,0,0,0.7)';battleCtx.fillRect(0,0,800,40);
  battleCtx.fillStyle='#fff';battleCtx.font='bold 16px sans-serif';battleCtx.textAlign='left';
  battleCtx.fillText('💀 心魔幻境',15,28);
  battleCtx.fillStyle='#e94560';battleCtx.fillText('⏱ '+Math.ceil(Math.max(0,battleTime))+'s',250,28);
  battleCtx.fillStyle='#f0c040';battleCtx.fillText('⭐ '+battleScore+' / 60',410,28);
  battleCtx.fillStyle='#3fb950';battleCtx.fillText('❤️ '+player.hp,560,28);
  battleCtx.fillText('🌊 Wave '+battleWave,680,28);

  // 操作提示（持续显示）
  battleCtx.fillStyle='rgba(255,255,255,0.5)';battleCtx.font='11px sans-serif';battleCtx.textAlign='center';
  battleCtx.fillText('WASD 移动 | 鼠标瞄准 | 点击射击 | 生存60秒即胜利',400,485);

  battleAnim=requestAnimationFrame(battleLoop);
}

function renderBattleResult(){
  if(battleAnim)cancelAnimationFrame(battleAnim);
  document.removeEventListener('keydown',battleKeyDown);document.removeEventListener('keyup',battleKeyUp);
  const canvas=document.getElementById('battleCanvas');
  if(canvas){canvas.removeEventListener('mousemove',battleMouseMove);canvas.removeEventListener('click',battleClick);}

  const app=document.getElementById('app');
  if(battleWon){
    const sprGain=Math.max(1,Math.floor(battleScore/10));
    G.attr.SPR=clamp(G.attr.SPR+sprGain,0,10);
    G.lowSprDays=0;G.sprWarned=false;
    G.flags['heart_demon_won']=true;
    app.innerHTML=buildShell(`<div class="feedback fadein"><div class="fbtitle">💀 心魔幻境 · 突破！</div>
      <div class="fbtext">你战胜了内心深处的梦魇。\n\n那些扭曲的面孔恢复了原样——\n\n教室回来了。阳光照在课桌上。\n\n你深吸一口气。\n\n还活着。还能继续。</div>
      <div class="fbaff"><span class="fbup">🧘精神 +${sprGain}</span> <span style="color:var(--gold)">⭐得分 ${battleScore}</span></div>
      </div><div style="text-align:center;margin:10px 0"><button class="btn btn-p" onclick="window._adv()">继续 ▸</button></div>`);
  }else{
    curEv={type:'forced_end',narration:`💀 心魔吞噬\n\n60秒过去了。\n\n你没有战胜那些幻影。\n\n教室越来越远——\n\n有人在叫你的名字。\n\n但你已经听不清了。`,
      choices:[{t:'……回不去了',a:[],f:'丹尼尔老师打了电话。\n\n你的家人来接你了。\n\n离开那天——你没有告诉任何人。\n\n校门关上。\n\n这一次——没有回头。'}]};
    render('event');
  }
}

// ─── 启动 ───
render('title');

</script>
